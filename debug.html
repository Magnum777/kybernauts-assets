<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Debug Decrypt</title></head>
<body>
<pre id="log">Starting debug...</pre>
<script>
function log(msg) { document.getElementById('log').textContent += '\n' + msg; console.log(msg); }

(async function() {
  const passphrase = 'u^w%dEUq!$_&E5l++oGjXT%5UYqlSWZEiASjtTdd_Cbn&ob5w6e9Y8v';
  
  log('=== DECRYPT DEBUG ===');
  log('Passphrase: ' + passphrase.substring(0, 10) + '... (' + passphrase.length + ' chars)');
  
  const encoder = new TextEncoder();
  
  try {
    const resp = await fetch('data.enc');
    log('fetch status: ' + resp.status + ' ' + resp.statusText);
    log('content-type: ' + resp.headers.get('content-type'));
    log('content-encoding: ' + resp.headers.get('content-encoding'));
    
    const buf = await resp.arrayBuffer();
    const data = new Uint8Array(buf);
    log('ArrayBuffer bytes: ' + data.length);
    
    const salt = data.slice(0, 16);
    const nonce = data.slice(16, 28);
    const ciphertext = data.slice(28, data.length - 16);
    const tag = data.slice(data.length - 16);
    
    log('Salt (hex): ' + Array.from(salt).map(b=>b.toString(16).padStart(2,'0')).join(''));
    log('Nonce (hex): ' + Array.from(nonce).map(b=>b.toString(16).padStart(2,'0')).join(''));
    log('Tag (hex): ' + Array.from(tag).map(b=>b.toString(16).padStart(2,'0')).join(''));
    log('Ciphertext bytes: ' + ciphertext.length);
    
    // Derive key
    const keyMaterial = await crypto.subtle.importKey(
      'raw', encoder.encode(passphrase), 'PBKDF2', false, ['deriveBits']
    );
    log('Imported key material');
    
    const bits = await crypto.subtle.deriveBits(
      { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial, 256
    );
    log('Derived 256 bits');
    
    const key = await crypto.subtle.importKey('raw', bits, 'AES-GCM', false, ['decrypt']);
    log('Imported AES key');
    
    // Build ciphertext+tag buffer (no nonce)
    const ctWithTag = new Uint8Array(ciphertext.length + tag.length);
    ctWithTag.set(ciphertext, 0);
    ctWithTag.set(tag, ciphertext.length);
    
    log('Decrypting with AES-GCM...');
    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: nonce, tagLength: 128 },
      key,
      ctWithTag
    );
    
    log('Decrypted bytes: ' + decrypted.byteLength);
    const text = new TextDecoder('utf-8').decode(decrypted);
    log('Decoded to text, length: ' + text.length);
    
    const json = JSON.parse(text);
    log('PARSED JSON SUCCESS');
    log('Locations: ' + json.summary.totalLocations);
    log('Systems: ' + json.summary.totalSystems);
    log('Total ISK: ' + json.summary.totalIsk.toLocaleString());
    
  } catch (e) {
    log('ERROR: ' + e.name + ': ' + e.message);
    log('Stack: ' + (e.stack || 'no stack'));
  }
})();
</script>
</body>
</html>
